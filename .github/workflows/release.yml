name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build extensions
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package Chrome extension
        run: |
          cd build/chrome
          zip -r "../../ClawdMate-Chrome-${{ steps.version.outputs.tag }}.zip" .

      - name: Package Firefox extension (.xpi)
        run: |
          cd build/firefox
          zip -r "../../ClawdMate-Firefox-${{ steps.version.outputs.tag }}.xpi" .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ClawdMate ${{ steps.version.outputs.tag }}
          body: |
            ## Installation

            ### Chrome
            1. Download **ClawdMate-Chrome-${{ steps.version.outputs.tag }}.zip**
            2. Unzip it to a folder
            3. Open `chrome://extensions` → enable **Developer mode**
            4. Click **Load unpacked** → select the unzipped folder

            ### Firefox
            1. Download **ClawdMate-Firefox-${{ steps.version.outputs.tag }}.xpi**
            2. Open Firefox → `about:addons` → gear icon ⚙️ → **Install Add-on From File**
            3. Select the downloaded `.xpi` file
          files: |
            ClawdMate-Chrome-${{ steps.version.outputs.tag }}.zip
            ClawdMate-Firefox-${{ steps.version.outputs.tag }}.xpi
          generate_release_notes: true
